<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>资产收益助手 (基金/期货)</title>
    <style>
        /* ===== 基础重置 ===== */
        html,
        body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        body {
            width: 580px;
            height: 550px;
            display: flex;
            flex-direction: column;
            font-family: -apple-system, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
            background: #0d1b2e;
            color: #c8d8f0;
        }

        body.is-fullscreen {
            width: 100% !important;
            height: 100% !important;
        }

        /* ===== Header ===== */
        .header {
            background: linear-gradient(135deg, #0d1b2e 0%, #1a2f50 100%);
            color: #e8f0ff;
            padding: 10px 16px;
            font-weight: 700;
            font-size: 15px;
            flex-shrink: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1e3a5f;
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-logo::before {
            content: '📈';
            font-size: 16px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #refreshBtn {
            cursor: pointer;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #a8c4e8;
            padding: 4px 6px;
            border-radius: 6px;
            line-height: 1;
            transition: background 0.2s, color 0.2s;
        }

        #refreshBtn:hover {
            background: rgba(24, 144, 255, 0.25);
            color: #69b1ff;
        }

        #refreshBtn.spinning {
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        #fullscreenBtn {
            cursor: pointer;
            font-size: 16px;
            color: #a8c4e8;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        #fullscreenBtn:hover {
            opacity: 1;
        }

        input,
        select {
            padding: 6px 8px;
            background: #0d1b2e;
            border: 1px solid #2a4a72;
            border-radius: 6px;
            font-size: 12px;
            color: #c8d8f0;
            outline: none;
            transition: border-color 0.2s;
        }

        input::placeholder {
            color: #4a6a90;
        }

        input:focus,
        select:focus {
            border-color: #1890ff;
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.15);
        }

        select option {
            background: #0d1b2e;
        }

        button {
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            padding: 5px 10px;
            transition: filter 0.15s, transform 0.1s;
        }

        button:hover {
            filter: brightness(1.15);
        }

        button:active {
            transform: scale(0.96);
        }

        /* ===== 统计栏 ===== */
        .summary-bar {
            background: #111f35;
            padding: 10px 16px;
            display: flex;
            justify-content: space-around;
            border-bottom: 1px solid #1e3a5f;
            font-size: 11px;
            color: #6a8aaa;
            flex-shrink: 0;
        }

        .summary-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .summary-item b {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        /* ===== 筛选栏 ===== */
        .filter-bar {
            padding: 6px 14px;
            background: #0d1b2e;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            border-bottom: 1px solid #1e3a5f;
        }

        .filter-bar label {
            font-size: 11px;
            color: #4a6a90;
        }

        /* ===== 表格容器 ===== */
        .table-container {
            flex: 1;
            overflow-y: auto;
            background: #0d1b2e;
        }

        /* 滚动条美化 */
        .table-container::-webkit-scrollbar {
            width: 5px;
        }

        .table-container::-webkit-scrollbar-track {
            background: #0d1b2e;
        }

        .table-container::-webkit-scrollbar-thumb {
            background: #2a4a72;
            border-radius: 3px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: auto;
        }

        th {
            background: #111f35;
            position: sticky;
            top: 0;
            z-index: 10;
            font-weight: 500;
            font-size: 11px;
            color: #4a6a90;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #1e3a5f;
        }

        th,
        td {
            padding: 9px 7px;
            text-align: left;
            border-bottom: 1px solid #141f30;
            font-size: 12px;
        }

        tbody tr {
            transition: background 0.15s;
        }

        tbody tr:hover {
            background: rgba(24, 144, 255, 0.06);
        }

        /* ===== 涨跌色 ===== */
        .up {
            color: #f5222d;
            font-weight: 700;
        }

        .down {
            color: #39b56e;
            font-weight: 700;
        }

        /* ===== 标签/名称 ===== */
        .group-tag {
            font-size: 10px;
            color: #4a6a90;
            background: #1a2f50;
            padding: 1px 5px;
            border-radius: 3px;
            cursor: pointer;
            display: inline-block;
            margin-top: 2px;
            border: 1px solid #2a4a72;
            transition: border-color 0.15s;
        }

        .group-tag:hover {
            border-color: #1890ff;
            color: #69b1ff;
        }

        .fund-name {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
            max-width: 140px;
            color: #c8d8f0;
        }

        .dividend-badge {
            font-size: 10px;
            color: #fff;
            background: #fa8c16;
            padding: 2px 6px;
            border-radius: 3px;
            display: inline-block;
            margin-left: 6px;
            border: 1px solid #ff9c6e;
            font-weight: 600;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.7;
            }
        }

        /* 份额列（小窗口隐藏） */
        .sortable {
            cursor: pointer;
            user-select: none;
        }

        .sortable:hover {
            color: #69b1ff;
        }

        .del-btn {
            color: #cf4444;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 13px;
            padding: 3px 5px;
            transition: color 0.15s;
        }

        .del-btn:hover {
            color: #ff6b6b;
        }

        /* ===== 状态栏 ===== */
        #status {
            padding: 5px 14px;
            font-size: 11px;
            color: #3a5a82;
            background: #0a1525;
            border-top: 1px solid #1e3a5f;
            flex-shrink: 0;
        }

        /* ===== Toast ===== */
        #toastContainer {
            position: fixed;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            pointer-events: none;
        }

        .toast {
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 12px;
            color: white;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
            opacity: 0;
            transform: translateY(10px);
            animation: toastIn 0.25s ease forwards;
            pointer-events: none;
            max-width: 400px;
            text-align: center;
            backdrop-filter: blur(8px);
        }

        .toast.fade-out {
            animation: toastOut 0.3s ease forwards;
        }

        .toast.info {
            background: rgba(24, 144, 255, 0.9);
        }

        .toast.success {
            background: rgba(46, 164, 79, 0.9);
        }

        .toast.warning {
            background: rgba(224, 123, 0, 0.9);
        }

        .toast.error {
            background: rgba(207, 68, 68, 0.9);
        }

        @keyframes toastIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes toastOut {
            to {
                opacity: 0;
                transform: translateY(-8px);
            }
        }

        /* ===== Modal ===== */
        #modalOverlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: 10003;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        #modalOverlay.visible {
            display: flex;
        }

        .modal-box {
            background: #111f35;
            border: 1px solid #2a4a72;
            border-radius: 12px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6);
            padding: 22px 24px 16px;
            min-width: 280px;
            max-width: 420px;
            width: 90%;
        }

        .modal-title {
            font-size: 14px;
            font-weight: 700;
            color: #e8f0ff;
            margin-bottom: 10px;
        }

        .modal-msg {
            font-size: 12px;
            color: #8aacce;
            white-space: pre-wrap;
            line-height: 1.7;
            margin-bottom: 14px;
        }

        .modal-input {
            width: 100%;
            box-sizing: border-box;
            padding: 8px 10px;
            background: #0d1b2e;
            border: 1px solid #2a4a72;
            border-radius: 6px;
            font-size: 13px;
            color: #c8d8f0;
            margin-bottom: 14px;
            outline: none;
        }

        .modal-input:focus {
            border-color: #1890ff;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        .modal-btn {
            padding: 7px 18px;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            border: none;
            font-weight: 600;
        }

        .modal-btn-cancel {
            background: #1a2f50;
            color: #8aacce;
        }

        .modal-btn-cancel:hover {
            background: #2a4a72;
        }

        .modal-btn-ok {
            background: #1890ff;
            color: #fff;
        }

        .modal-btn-ok:hover {
            background: #40a9ff;
        }

        .modal-btn-danger {
            background: #cf4444;
            color: #fff;
        }

        .modal-btn-danger:hover {
            background: #e05555;
        }

        /* ===== 响应式：小窗口 ===== */
        body:not(.is-fullscreen) .col-hide {
            display: none;
        }

        body:not(.is-fullscreen) .summary-bar {
            font-size: 10px;
            padding: 7px 8px;
        }

        body:not(.is-fullscreen) .summary-item b {
            font-size: 13px;
        }

        body:not(.is-fullscreen) th,
        body:not(.is-fullscreen) td {
            padding: 6px 4px;
            font-size: 11px;
        }

        body:not(.is-fullscreen) .adjust-btn {
            padding: 2px 5px;
            font-size: 12px;
        }

        /* ===== 全屏增强 ===== */
        body.is-fullscreen .fund-name {
            max-width: 320px;
        }

        body.is-fullscreen table {
            font-size: 13px;
        }

        .btn-clear {
            background: #ff4d4f;
            color: white;
            border: none;
            padding: 2px 6px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            margin-left: 4px;
        }

        .btn-clear:hover {
            background: #cf4444;
        }

        /* ===== 表单弹窗 ===== */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: #8aacce;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            box-sizing: border-box;
            padding: 10px 12px;
            background: #0d1b2e;
            border: 1px solid #2a4a72;
            border-radius: 6px;
            color: #e8f0ff;
            font-size: 14px;
            transition: all 0.2s;
        }

        .form-group input:focus {
            border-color: #1890ff;
            box-shadow: 0 0 0 2px rgba(24, 144, 255, 0.2);
        }

        .form-header-sub {
            font-size: 12px;
            color: #8aacce;
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid #1e3a5f;
        }

        /* 表单里的"全部"按钮 */
        .all-btn {
            background: #1a2f50;
            border: 1px solid #2a4a72;
            color: #8aacce;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 12px;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.15s;
        }

        .all-btn:hover {
            background: #2a4a72;
            color: #c8d8f0;
        }

        /* 下单时间切换器 */
        .timing-switcher {
            display: flex;
            gap: 6px;
            margin-bottom: 12px;
            align-items: center;
        }

        .timing-switcher span {
            font-size: 11px;
            color: #8aacce;
            flex-shrink: 0;
        }

        .timing-btn {
            cursor: pointer;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            border: 1px solid #2a4a72;
            background: transparent;
            color: #8aacce;
            transition: all 0.15s;
        }

        .timing-btn.active-before {
            background: #1890ff;
            color: #fff;
            border-color: #1890ff;
        }

        .timing-btn.active-after {
            background: #fa8c16;
            color: #fff;
            border-color: #fa8c16;
        }

        /* 交易记录列表 */
        .tx-list {
            max-height: 320px;
            overflow-y: auto;
            margin: -4px 0;
        }

        .tx-item {
            padding: 10px 0;
            border-bottom: 1px solid #1e3a5f;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .tx-item:last-child {
            border-bottom: none;
        }

        .tx-row-main {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .tx-row-left {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .tx-type {
            font-size: 12px;
            font-weight: 700;
        }

        .tx-type.add {
            color: #ff7875;
        }

        .tx-type.remove {
            color: #73d13d;
        }

        .tx-type.dividend {
            color: #ffc53d;
        }

        .tx-amount {
            font-size: 12px;
            color: #c8d8f0;
        }

        .tx-amount b.add {
            color: #ff7875;
        }

        .tx-amount b.remove {
            color: #73d13d;
        }

        .tx-badge {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 8px;
            color: #fff;
        }

        .tx-badge.pending {
            background: #fa8c16;
        }

        .tx-badge.confirmed {
            background: #2ea44f;
        }

        .tx-nav {
            font-size: 11px;
            color: #6a8aaa;
        }

        .tx-date {
            font-size: 10px;
            color: #3a5a82;
        }

        .tx-revoke-btn {
            background: none;
            border: 1px solid #cf4444;
            color: #cf4444;
            border-radius: 6px;
            padding: 2px 8px;
            font-size: 11px;
            cursor: pointer;
            flex-shrink: 0;
            transition: all 0.15s;
        }

        .tx-revoke-btn:hover {
            background: rgba(207, 68, 68, 0.12);
        }

        .tx-no-revoke {
            font-size: 11px;
            color: #3a5a82;
        }

        /* ===== 设置齿轮图标 ===== */
        .settings-icon {
            margin-left: 8px;
            cursor: pointer;
            opacity: 0.4;
            font-size: 14px;
            transition: opacity 0.2s, transform 0.2s;
            display: inline-block;
            user-select: none;
        }

        .settings-icon:hover {
            opacity: 1;
            transform: rotate(45deg);
        }

        /* ===== 上下文菜单 ===== */
        .context-menu {
            position: fixed;
            background: #1a2f50;
            border: 1px solid #2a4a72;
            border-radius: 8px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            z-index: 20000;
            min-width: 130px;
            padding: 6px 0;
            display: none;
            overflow: hidden;
        }

        /* ===== 居中操作弹窗样式 ===== */
        /* 背景遮罩：虚化效果 */
        .center-modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(4px);
            z-index: 10001;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .center-modal-overlay.visible {
            display: flex;
        }

        .center-modal-box {
            width: 320px;
            background: #111f35;
            border: 1px solid #2a4a72;
            border-radius: 12px;
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.6);
            overflow: hidden;
            font-family: -apple-system, "PingFang SC", sans-serif;
            transform: scale(0.9);
            opacity: 0;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .center-modal-overlay.visible .center-modal-box {
            transform: scale(1);
            opacity: 1;
        }

        .center-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            border-bottom: 1px solid #1e3a5f;
        }

        .modal-title {
            font-size: 14px;
            font-weight: 700;
            color: #e8f0ff;
        }

        .modal-link {
            font-size: 12px;
            color: #69b1ff;
            cursor: pointer;
            text-decoration: none;
        }

        .modal-link:hover {
            color: #91caff;
        }

        .center-modal-info {
            padding: 14px 18px;
            text-align: center;
            border-bottom: 1px solid #1e3a5f;
            background: #0d1b2e;
        }

        .info-name {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #c8d8f0;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .info-code {
            font-size: 11px;
            color: #4a6a90;
        }

        .center-modal-actions {
            padding: 14px 18px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .action-row-double {
            display: flex;
            gap: 8px;
        }

        .btn-op {
            flex: 1;
            padding: 10px 0;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            border: 1px solid;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .btn-op.add {
            background: rgba(245, 34, 45, 0.12);
            color: #ff7875;
            border-color: rgba(245, 34, 45, 0.3);
        }

        .btn-op.add:hover {
            background: rgba(245, 34, 45, 0.22);
        }

        .btn-op.remove {
            background: rgba(57, 181, 110, 0.12);
            color: #73d13d;
            border-color: rgba(57, 181, 110, 0.3);
        }

        .btn-op.remove:hover {
            background: rgba(57, 181, 110, 0.22);
        }

        .btn-op.dividend {
            background: rgba(250, 140, 22, 0.12);
            color: #ffc53d;
            border-color: rgba(250, 140, 22, 0.3);
        }

        .btn-op.dividend:hover {
            background: rgba(250, 140, 22, 0.22);
        }

        .btn-op.edit {
            background: rgba(24, 144, 255, 0.12);
            color: #69b1ff;
            border-color: rgba(24, 144, 255, 0.3);
        }

        .btn-op.edit:hover {
            background: rgba(24, 144, 255, 0.22);
        }

        .btn-op.calc {
            background: rgba(212, 136, 6, 0.12);
            color: #ffc53d;
            border-color: rgba(212, 136, 6, 0.3);
        }

        .btn-op.calc:hover {
            background: rgba(212, 136, 6, 0.22);
        }

        .btn-op.clear {
            background: rgba(207, 68, 68, 0.08);
            color: #ff9c9c;
            border-color: rgba(207, 68, 68, 0.2);
        }

        .btn-op.clear:hover {
            background: rgba(207, 68, 68, 0.18);
        }

        .btn-op.delete {
            background: transparent;
            color: #cf4444;
            border-color: transparent;
        }

        .btn-op.delete:hover {
            background: rgba(207, 68, 68, 0.12);
            border-color: rgba(207, 68, 68, 0.2);
        }

        /* ===== 基金详情弹窗（深色主题） ===== */
        .fund-detail-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(6px);
            z-index: 10002;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }

        .fund-detail-overlay.visible {
            display: flex;
        }

        .fund-detail-box {
            width: 92%;
            max-width: 800px;
            max-height: min(88vh, 760px);
            background: #0a1525;
            border: 1px solid #1e3a5f;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .fund-detail-box.fit-page {
            width: calc(100vw - 24px);
            max-width: 1400px;
            max-height: calc(100vh - 24px);
        }

        .fund-detail-header {
            padding: 16px 20px;
            background: #111f35;
            border-bottom: 1px solid #1e3a5f;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .fund-detail-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .fund-detail-fit-btn {
            cursor: pointer;
            font-size: 12px;
            color: #8aacce;
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid #2a4a72;
            background: rgba(13, 27, 46, 0.85);
            transition: all 0.2s;
            user-select: none;
        }

        .fund-detail-fit-btn:hover {
            color: #e8f0ff;
            border-color: #4b78a8;
            background: rgba(24, 144, 255, 0.12);
        }

        .fund-detail-title {
            font-size: 16px;
            font-weight: 600;
            color: #e8f0ff;
        }

        .fund-detail-close {
            cursor: pointer;
            font-size: 20px;
            color: #6a8aaa;
            transition: color 0.2s;
            line-height: 1;
        }

        .fund-detail-close:hover {
            color: #c8d8f0;
        }

        .fund-detail-content {
            flex: 1;
            overflow-y: auto;
            background: #0d1b2e;
        }

        .fund-detail-content::-webkit-scrollbar {
            width: 6px;
        }

        .fund-detail-content::-webkit-scrollbar-track {
            background: #0d1b2e;
        }

        .fund-detail-content::-webkit-scrollbar-thumb {
            background: #2a4a72;
            border-radius: 3px;
        }

        .detail-info-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .detail-info-label {
            font-size: 11px;
            color: #4a6a90;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .detail-info-value {
            font-size: 15px;
            font-weight: 700;
            color: #e8f0ff;
            font-family: 'Inter', -apple-system, sans-serif;
        }

        .detail-info-value.bold {
            font-size: 18px;
        }

        .detail-info-value.hero {
            font-size: 24px;
            color: #69b1ff;
        }

        /* 估值时间小框 */
        .estimation-box {
            background: rgba(26, 47, 80, 0.4);
            border: 1px solid #1e3a5f;
            border-radius: 6px;
            padding: 8px 12px;
            text-align: right;
            margin-bottom: 20px;
        }

        .estimation-label {
            font-size: 10px;
            color: #4a6a90;
            margin-bottom: 2px;
        }

        .estimation-time {
            font-size: 12px;
            color: #c8d8f0;
            font-weight: 700;
        }

        /* 两列股票网格 */
        .holdings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 10px 0;
        }

        .holding-card {
            background: rgba(13, 27, 46, 0.5);
            border: 1px solid #1e3a5f;
            border-radius: 10px;
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.2s;
        }

        .holding-card:hover {
            border-color: #2a4a72;
        }

        .holding-card-left {
            display: flex;
            flex-direction: column;
            gap: 2px;
            max-width: 55%;
        }

        .holding-card-name {
            font-size: 13px;
            color: #c8d8f0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }

        .holding-card-badge {
            font-size: 11px;
            color: #3b6697;
            font-weight: 600;
        }

        .holding-card-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
        }

        .holding-card-rate {
            font-size: 12px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 6px;
            min-width: 50px;
            text-align: center;
        }

        .holding-card-rate.up {
            background: rgba(245, 34, 45, 0.1);
            color: #ff7875;
        }

        .holding-card-rate.down {
            background: rgba(57, 181, 110, 0.1);
            color: #73d13d;
        }

        .holding-card-percent {
            font-size: 12px;
            color: #69b1ff;
            font-weight: 600;
        }

        /* 面积图渐变背景 */
        .detail-chart-section {
            background: #0a1525;
            margin: 0;
            padding: 0 16px 24px;
        }

        .detail-loading {
            text-align: center;
            color: #4a6a90;
            font-size: 13px;
            padding: 40px 0;
        }

        /* 补全 Tab 切换按钮样式 */
        .detail-tabs {
            display: flex;
            background: #0d1b2e;
            border-bottom: 1px solid #1e3a5f;
            border-top: 1px solid #1e3a5f;
            margin-bottom: 0px;
        }

        .detail-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 13px;
            color: #4a6a90;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            font-weight: 600;
        }

        .detail-tab.active {
            color: #69b1ff;
            background: rgba(24, 144, 255, 0.05);
            border-bottom-color: #1890ff;
        }

        .detail-tab:hover:not(.active) {
            color: #c8d8f0;
            background: rgba(255, 255, 255, 0.02);
        }

        .detail-tab-content {
            display: none;
            background: #111f35;
            padding: 18px 16px 24px;
        }

        .detail-tab-content.active {
            display: block;
        }

        .perf-nav-section {
            margin-top: 14px;
            padding: 12px 14px;
            border: 1px solid #1e3a5f;
            border-radius: 10px;
            background: rgba(13, 27, 46, 0.55);
        }

        .perf-nav-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 10px;
        }

        .perf-nav-title {
            font-size: 13px;
            font-weight: 600;
            color: #c8d8f0;
        }

        .perf-nav-preview,
        .perf-nav-modal-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .perf-nav-modal-list {
            max-height: 320px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .perf-nav-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 8px 10px;
            border: 1px solid rgba(30, 58, 95, 0.9);
            border-radius: 8px;
            background: rgba(17, 31, 53, 0.9);
        }

        .perf-nav-row.full {
            padding: 9px 12px;
        }

        .perf-nav-date {
            font-size: 12px;
            color: #8aacce;
        }

        .perf-nav-price {
            font-size: 13px;
            font-weight: 700;
            color: #e8f0ff;
        }

        .perf-nav-empty {
            padding: 14px 0;
            text-align: center;
            font-size: 12px;
            color: #4a6a90;
        }

        .detail-error {
            text-align: center;
            color: #ff7875;
            font-size: 13px;
            padding: 40px 0;
        }

        /* 悬浮球容器 */
        .fab-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 999;
        }

        /* 主球体 */
        .fab-main {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, #1890ff 0%, #3aa0ff 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }

        .fab-main:hover {
            transform: translateY(-1px) scale(1.04);
            box-shadow: 0 10px 28px rgba(0, 0, 0, 0.32);
        }

        .fab-main.active {
            transform: rotate(18deg);
            filter: brightness(1.06);
        }

        /* 菜单项 */
        .fab-menu {
            position: absolute;
            bottom: 66px;
            right: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 190px;
            padding: 10px;
            background: rgba(10, 23, 40, 0.92);
            border: 1px solid rgba(58, 90, 130, 0.6);
            border-radius: 18px;
            box-shadow: 0 14px 32px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(10px);
            pointer-events: none;
            opacity: 0;
            transform: translateY(12px) scale(0.98);
            transform-origin: bottom right;
            transition: opacity 0.2s ease, transform 0.2s ease;
        }

        .fab-menu.show {
            pointer-events: auto;
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .fab-item {
            min-height: 38px;
            white-space: nowrap;
            background: linear-gradient(180deg, #132742 0%, #0f2037 100%);
            border: 1px solid #28496f;
            padding: 9px 14px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            color: #d2e3fb;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.18);
            transition: background 0.15s, color 0.15s, border-color 0.15s, transform 0.15s;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 8px;
            text-align: left;
        }

        .fab-item:hover {
            background: linear-gradient(180deg, #183254 0%, #142845 100%);
            color: #8dc5ff;
            border-color: #3a7fbd;
            transform: translateX(-2px);
        }

        .fab-item .fab-icon {
            width: 18px;
            text-align: center;
            flex-shrink: 0;
        }

        .fab-item .fab-label {
            flex: 1;
        }

        /* 选中行高亮（文件管理器风格） */
        tr.selected-row {
            background-color: rgba(24, 144, 255, 0.18) !important;
            outline: 1px solid rgba(24, 144, 255, 0.4);
        }

        /* 鼠标悬停效果 */
        #fundTableBody tr {
            cursor: pointer;
            transition: background-color 0.15s;
            user-select: none;
            /* 禁止行内文字被选中 */
        }

        #fundTableBody tr:hover:not(.selected-row) {
            background-color: rgba(255, 255, 255, 0.04);
        }

        /* ===== 通知中心样式 ===== */
        #notificationBtn {
            position: relative;
            cursor: pointer;
            font-size: 16px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #a8c4e8;
            padding: 4px 8px;
            border-radius: 6px;
            line-height: 1;
            transition: background 0.2s, color 0.2s;
        }

        #notificationBtn:hover {
            background: rgba(24, 144, 255, 0.25);
            color: #69b1ff;
        }

        .notification-list {
            max-height: 400px;
            overflow-y: auto;
            margin: -14px 0 -14px 0;
            line-height: 1;
        }

        .notification-item {
            padding: 6px 0;
            border-bottom: 1px solid #1e3a5f;
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .notification-item:last-child {
            border-bottom: none;
        }

        .notification-header {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .notification-type {
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 8px;
            color: #fff;
            flex-shrink: 0;
        }

        .notification-type.info {
            background: #1890ff;
        }

        .notification-type.success {
            background: #2ea44f;
        }

        .notification-type.warning {
            background: #fa8c16;
        }

        .notification-type.error {
            background: #cf4444;
        }

        .notification-time {
            font-size: 10px;
            color: #4a6a90;
            margin-left: auto;
        }

        .notification-message {
            font-size: 12px;
            color: #c8d8f0;
            line-height: 1.4;
            padding-left: 2px;
        }

        .notification-empty {
            text-align: center;
            padding: 40px 20px;
            color: #4a6a90;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <div class="header">
        <span>资产收益助手</span>
        <div class="header-actions">
            <button id="notificationBtn" title="通知中心" style="position: relative;">
                🔔
                <span id="notificationBadge"
                    style="display: none; position: absolute; top: -2px; right: -2px; background: #ff4d4f; color: white; border-radius: 10px; padding: 0 5px; font-size: 10px; min-width: 16px; text-align: center;"></span>
            </button>
            <button id="refreshBtn" title="刷新行情">🔄</button>
            <span id="fullscreenBtn" title="全屏查看">⛶</span>
        </div>
    </div>

    <div class="fab-container">
        <div class="fab-menu" id="fabMenu">
            <button class="fab-item" id="fabSelectAll"><span class="fab-icon">☑️</span><span class="fab-label">全选 / 取消全选</span></button>
            <button class="fab-item" id="fabAdd"><span class="fab-icon">➕</span><span class="fab-label">添加资产</span></button>
            <button class="fab-item" id="fabOCRBatch"><span class="fab-icon">📷</span><span class="fab-label">图片识别批量添加</span></button>
            <button class="fab-item" id="fabBatchCalc"><span class="fab-icon">🔄</span><span class="fab-label">批量重算份额</span></button>
            <button class="fab-item" id="fabBatchDel"><span class="fab-icon">🗑</span><span class="fab-label">批量删除</span></button>
            <button class="fab-item" id="fabSettlement"><span class="fab-icon">📅</span><span class="fab-label">触发日结算</span></button>
            <button class="fab-item" id="fabRollback" style="display:none;"><span class="fab-icon">↩</span><span class="fab-label">撤销日结算</span></button>
            <button class="fab-item" id="fabBatchGroup"><span class="fab-icon">📁</span><span class="fab-label">批量修改分组</span></button>
            <button class="fab-item" id="fabBatchClear"><span class="fab-icon">🧹</span><span class="fab-label">批量清空持仓</span></button>
            <button class="fab-item" id="fabExport"><span class="fab-icon">📤</span><span class="fab-label">导出当前数据</span></button>
            <button class="fab-item" id="fabExportBackup"><span class="fab-icon">🗂</span><span class="fab-label">导出备份数据</span></button>
            <button class="fab-item" id="fabImport"><span class="fab-icon">📥</span><span class="fab-label">导入数据</span></button>
        </div>
        <div class="fab-main" id="fabMain">
            <span>⚡</span>
        </div>
    </div>

    <!-- 统计栏 -->
    <div class="summary-bar">
        <div class="summary-item">总资产: <b id="totalAmount">0.00</b></div>
        <div class="summary-item">昨日总收益: <b id="totalYesterdayProfit">0.00</b></div>
        <div class="summary-item">当日估计总收益: <b id="totalTodayProfit">0.00</b></div>
        <div class="summary-item">总累计收益: <b id="totalTotalProfit">0.00</b></div>
    </div>

    <div class="filter-bar">
        <label style="font-size: 12px; color: #666;">筛选分组:</label>
        <select id="groupFilter">
            <option value="all">全部显示</option>
        </select>
        <datalist id="groupList"></datalist>
    </div>

    <!-- 所有操作按钮通过悬浮球 FAB 访问，以下为隐藏的功能性元素 -->
    <input type="file" id="importFile" accept=".json" style="display:none;">
    <!-- 以下按钮隐藏，仅作 JS 绑定用（逻辑由 FAB 触发） -->
    <button id="addBtn" style="display:none;"></button>
    <button id="exportBtn" style="display:none;"></button>
    <button id="importBtn" style="display:none;"></button>
    <button id="settlementBtn" style="display:none;"></button>
    <button id="rollbackBtn" style="display:none;"></button>
    <button id="batchGroupBtn" style="display:none;"></button>
    <button id="batchClearBtn" style="display:none;"></button>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>序号</th>
                    <th class="sortable" data-sort="code">代码</th>
                    <th>名称/分组</th>
                    <th class="sortable" data-sort="amount">持仓</th>
                    <th class="sortable col-hide" data-sort="shares">份额</th>
                    <th class="sortable col-hide" data-sort="prevPrice">净值</th>
                    <th class="sortable" data-sort="yesterdayProfit">昨日收益</th>
                    <th class="sortable" data-sort="todayProfit">估值收益</th>
                    <th class="sortable" data-sort="holdProfit">累计收益</th>
                    <th class="col-hide">操作</th>
                </tr>
            </thead>
            <tbody id="fundTableBody"></tbody>
        </table>
    </div>

    <div id="status">准备就绪</div>

    <!-- Toast 容器 -->
    <div id="toastContainer"></div>

    <!-- 通用 Modal 弹窗 -->
    <div id="modalOverlay">
        <div class="modal-box">
            <div class="modal-title" id="modalTitle">提示</div>
            <div class="modal-msg" id="modalMsg"></div>
            <input class="modal-input" id="modalInput" type="text" style="display:none;">
            <div class="modal-footer" id="modalFooter"></div>
        </div>
    </div>

    <!-- 基金详情弹窗 -->
    <div class="fund-detail-overlay" id="fundDetailOverlay">
        <div class="fund-detail-box">
            <div class="fund-detail-header">
                <div class="fund-detail-title" id="fundDetailTitle">基金详情</div>
                <div class="fund-detail-actions">
                    <div class="fund-detail-fit-btn" id="fundDetailFitBtn" title="贴合页面大小">贴合页面</div>
                    <div class="fund-detail-close" id="fundDetailClose">✕</div>
                </div>
            </div>
            <div class="fund-detail-content" id="fundDetailContent" style="position:relative;">
                <div class="detail-loading">加载中...</div>
            </div>
        </div>
    </div>

    <!-- OCR 主线程模式：先加载 core，再加载改造后的 worker（暴露 __TesseractDispatch） -->
    <script src="tesseract-core.wasm.js"></script>
    <script src="worker.min.js"></script>
    <script src="tesseract.min.js"></script>
    <script src="popup.js"></script>
</body>

</html>
